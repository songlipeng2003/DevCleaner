name: CI Verification

on:
  push:
    branches: [main, master, develop]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ==================== Commit Lint ====================
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: npx commitlint --from HEAD~1 --to HEAD --verbose

  # ==================== 代码验证 ====================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [commit-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ==================== 单元测试 ====================
  unit-test:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ==================== 前端构建 ====================
  frontend-build:
    name: Frontend Build
    needs: [e2e-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ==================== E2E 测试 ====================
  e2e-test:
    name: E2E Tests
    needs: [unit-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  # ==================== 多平台构建测试 ====================
  build-matrix:
    name: Build Test - ${{ matrix.platform }}
    needs: [frontend-build]
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev || true
          # 尝试安装可选依赖
          sudo apt-get install -y libayatana-appindicator3-dev 2>/dev/null || true
          echo "Dependencies installation completed"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run tauri:build -- --no-bundle

      - name: Verify executable (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Found executable: $($exe.FullName)"
            Write-Host "Size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          } else {
            Write-Host "No .exe found in release directory"
            Get-ChildItem -Path "src-tauri/target/release" -Recurse | Format-Table Name, Length
            exit 1
          }

      - name: Verify executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          EXE=$(find src-tauri/target/release -name "devcleaner*" -type f | head -1)
          echo "Found: $EXE"
          ls -lh "$EXE"
          test -f "$EXE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.platform }}
          path: |
            src-tauri/target/release/devcleaner*
            src-tauri/target/release/bundle/
          if-no-files-found: warn
          retention-days: 3

  # ==================== 成功通知 ====================
  success:
    name: CI Complete
    needs: [build-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Verification Complete"
          echo "- Commit Lint: ${{ needs.commit-lint.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Unit Tests: ${{ needs.unit-test.result }}"
          echo "- E2E Tests: ${{ needs.e2e-test.result }}"
          echo "- Frontend Build: ${{ needs.frontend-build.result }}"
          echo "- Build Matrix: ${{ needs.build-matrix.result }}"
